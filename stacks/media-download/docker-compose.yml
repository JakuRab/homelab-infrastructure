services:
  gluetun:
    image: qmcgaw/gluetun:v3.39.0
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8083:8080"   # qBittorrent Web UI (external:internal)
      - "8889:8888"   # Gluetun HTTP proxy (external:internal)
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - FIREWALL_VPN_INPUT_PORTS=${QBITTORRENT_PORT}
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - /mnt/nvme/services/media/config/gluetun:/gluetun
    labels:
      - "glance.name=Gluetun"
      - "glance.icon=sh:gluetun-light"
    networks:
      - caddy_net
      - media_net
    dns:
      - 1.1.1.1
      - 1.0.0.1
    # Healthcheck disabled - VPN connects successfully
    # healthcheck:
    #   test: ["CMD", "wget", "--spider", "-q", "https://api.ipify.org"]
    #   interval: 60s
    #   timeout: 15s
    #   retries: 5
    #   start_period: 60s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - /mnt/nvme/services/media/config/qbittorrent:/config
      - /mnt/media/downloads:/downloads
    labels:
      - "glance.name=qBittorrent"
      - "glance.icon=sh:qbittorrent-light"
      - "glance.url=https://qbit.rabalski.eu"

  port-sync:
    image: alpine:latest
    container_name: port-sync
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      - gluetun
      - qbittorrent
    environment:
      - QBT_PASS=${QBITTORRENT_PASS}
      - INTERVAL=300
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until apk add --no-cache curl jq; do
          echo "apk install failed, retrying in 10s..."
          sleep 10
        done
        while true; do
          PORT=$$(curl -sf http://localhost:8000/v1/openvpn/portforwarded | jq -r '.port')
          if [ -n "$$PORT" ] && [ "$$PORT" != "null" ]; then
            curl -sf -c /tmp/c.txt -b /tmp/c.txt \
              -d "username=admin" -d "password=$$QBT_PASS" \
              http://localhost:8080/api/v2/auth/login > /dev/null
            curl -sf -c /tmp/c.txt -b /tmp/c.txt \
              --data-urlencode "json={\"listen_port\": $$PORT}" \
              http://localhost:8080/api/v2/app/setPreferences > /dev/null
            echo "Port synced: $$PORT"
          fi
          sleep $$INTERVAL
        done
    labels:
      - "glance.hide=true"

networks:
  caddy_net:
    external: true
  media_net:
    external: true
